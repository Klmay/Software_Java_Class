<!DOCTYPE html>
<html>
<head>
    <title>Neat Little Loan Calculator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border: 1px solid #214b21; padding: 10px; border-radius: 5px; }
        td { padding: 5px; }
    </style>
</head>
<body>
    <h3>Please enter your loan amount, interest rate, and number of years</h3>
    <form action="LoanServlet" method="post">
        <table>
            <tr>
                <td>Loan Amount:</td>
                <td><input type="number" step="0.01" name="loanAmount" required></td>
            </tr>
            <tr>
                <td>Annual Interest Rate:</td>
                <td><input type="number" step="0.01" name="annualInterestRate" required></td>
            </tr>
            <tr>
                <td>Number of Years:</td>
                <td><input type="number" name="numberOfYears" required></td>
            </tr>
            <tr>
                <td></td>
                <td><input type="submit" value="Compute Loan Payment"></td>
            </tr>
        </table>
    </form>
</body>
</html>
